base_task:
    input: unbuffer pt --nogroup "$(cat /Users/hirano.shigetoshi/temp)"
    opts:
        - multi
        - delimiter=':'
        - with-nth=1,3..
        - nth=2..
        - height=9999
        - layout=reverse-list
        - preview-window=up:60%
        - prompt="Search>"
    preview: bash /Users/hirano.shigetoshi/dotfiles/vim/fzfer/preview.sh {1} {2} $LINES
expects:
    ctrl-g:
        continue:
            input: git grep -n --color=always "$(cat /Users/hirano.shigetoshi/temp)"
            opts:
                - prompt="GitGrep>"
