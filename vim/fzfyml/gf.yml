base_task:
    input: git ls-files --full-name | awk 'BEGIN {print "(create)"} {print}'
    query: $(cat /Users/hirano.shigetoshi/temp)
    opts:
        - multi
        - reverse
        - no-sort
        - select-1
        - height=9999
    preview: head -1000 $(git rev-parse --show-toplevel)/{}
    output:
        enter:
            - pipe: sed "/^[^(]/s!^!$(git rev-parse --show-toplevel)/!" | tr '\n' ' '
switch_task:
    ctrl-h:
        input: cd $(git rev-parse --show-toplevel); git ls-files
