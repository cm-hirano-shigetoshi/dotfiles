base_task:
    input: unbuffer git status -sb
    opts:
        - multi
        - no-sort
        - reverse
        - nth=2..
        - preview-window=up:60%
    preview: ~/dotfiles/zsh/lib/preview-git.sh {}
binds:
    ctrl-v: execute-silent(tovim {-1})
expects:
    ctrl-m:
        stdout:
            pipe: grep -v '^##' | cut -c 4- | sed 's/^.\+ -> //' | tr '\n' ' '
