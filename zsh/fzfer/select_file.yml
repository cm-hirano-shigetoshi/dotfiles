variables:
  var1: $arg2
base_task:
  input: bash $(dirname $yml)/select_file.sh "$var1"
  query: $arg3
  opts:
    - multi
    - no-sort
    - layout=reverse-list
  preview: head -n 10000 {}
expects:
  enter:
    stdout:
      - prefix: $arg1
      - filepath:
      - join:
  ctrl-h:
    continue:
      var1: ../$var1
