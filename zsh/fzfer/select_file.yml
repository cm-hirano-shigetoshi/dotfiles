variables:
  var1: $arg2
base_task:
  input: bash $(dirname $yml)/select_file.sh "$var1"
  query: $arg3
  opts:
    - multi
    - no-sort
    - layout=reverse-list
  preview: head -n 10000 ${var1}/{}
expects:
  enter:
    stdout:
      - prefix: ${var1}/
      - join:
    pipe: sed 's%//\+%/%g'
  ctrl-h:
    continue:
      var1: ../$var1
  ctrl-g:
    continue:
      input: git -C $(git rev-parse --show-toplevel) ls-files --full-name
      var1: $(git rev-parse --show-toplevel | sed 's%$%/%')

