base_task:
  input: find . -type f 2>/dev/null | grep -v '/\.[^/]\+/'
  query: '${1}'
  opts:
    - multi
    - no-sort
    - layout=reverse-list
  preview: head -n 1000 {}
expects:
  enter:
    stdout:
      quote:
      join:
  ctrl-h:
    continue:
      input: find ~ -type f 2>/dev/null
  f1:
    continue:
      input: find .. -type f 2>/dev/null
  f2:
    continue:
      input: find ../.. -type f 2>/dev/null
  f3:
    continue:
      input: find $(cd ../../.. && pwd) -type f 2>/dev/null

