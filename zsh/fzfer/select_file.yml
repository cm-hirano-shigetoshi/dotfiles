base_task:
  input: bash ~/dotfiles/zsh/fzfer/select_file.sh "${2}"
  query: '${3}'
  opts:
    - prompt="${1}"
    - multi
    - no-sort
    - layout=reverse-list
  preview: head -n 10000 {}
expects:
  enter:
    stdout:
      - prefix: $(echo "${1}" | sed 's%^\./%%')
      - filepath:
      - join:
  ctrl-h:
    continue:
      input: find ~ -type f 2>/dev/null
  f1:
    continue:
      input: find .. -type f 2>/dev/null
  f2:
    continue:
      input: find ../.. -type f 2>/dev/null
  f3:
    continue:
      input: find $(cd ../../.. && pwd) -type f 2>/dev/null
  ctrl-d:
    continue:
      input: bash ~/dotfiles/zsh/fzfer/select_file.sh ${o}
      query: ''

