base_task:
  input: cat ~/.viminfo | grep '^> ' | cut -c 3-
  opts:
    - multi
    - select-1
expects:
  enter:
    stdout:
      quote:
      join:
  ctrl-s:
    continue:
      input: pt ''
      opts:
        - delimiter=':'
        - with-nth=1,3..
        - nth=2
      preview: bash ~/dotfiles/vim/fzfer/preview.sh  {1} {2} $LINES
